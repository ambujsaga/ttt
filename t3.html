<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T3</title>
    <style>
        :root {
            /* Light Theme Colors */
            --bg-color: #f4f7f6;
            --panel-bg: #ffffff;
            --text-color: #2b2d42;
            --primary: #4361ee;
            --danger: #ef233c;
            --success: #06d6a0;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.12);
        }
        
        /* Animated Background */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: var(--text-color); 
            transition: all 0.3s ease;
            background: linear-gradient(-45deg, #f4f7f6, #e0eafc, #cfdef3, #eef2f3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Utility */
        .hidden { display: none !important; }
        .btn { padding: 12px 15px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; transition: all 0.3s ease; font-size: 0.95rem; }
        .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; border-radius: 8px; border: 1px solid #dcdcdc; background: #f8f9fc; color: var(--text-color); transition: all 0.3s ease; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15); }
        
        /* Screens */
        #login-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: transparent; }
        #login-box { background: var(--panel-bg); padding: 40px 30px; border-radius: 20px; text-align: center; width: 300px; box-shadow: var(--shadow-md); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* Main Panel */
        #main-panel { display: flex; flex-direction: column; height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow: var(--shadow-sm); z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.5); }
        .header-left, .header-right { display: flex; gap: 15px; align-items: center; }
        .icon-btn { background: none; border: none; color: var(--text-color); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s ease, color 0.2s; padding: 5px; }
        .icon-btn:hover { transform: scale(1.15); color: var(--primary); }
        .edit-active { color: #f5b700; transform: scale(1.15); }

        /* Search Bar */
        #search-bar { padding: 8px 15px; border-radius: 20px; border: 1px solid #dcdcdc; width: 160px; font-size: 0.9rem; background: rgba(255, 255, 255, 0.9); margin: 0; }

        /* Grid & App Icons - Redesigned for Attractive Look */
        #app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 20px; padding: 25px; }
        
        .app-icon { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            cursor: pointer; 
            text-align: center; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            background: rgba(255, 255, 255, 0.4); /* Glassmorphism effect */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        
        .app-icon:hover { 
            transform: translateY(-8px) scale(1.05); 
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 12px 25px rgba(67, 97, 238, 0.15);
            border-color: rgba(67, 97, 238, 0.3);
        }
        
        .app-img { 
            width: 65px; 
            height: 65px; 
            border-radius: 18px; 
            object-fit: cover; 
            background: #fff; 
            margin-bottom: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
            transition: all 0.3s ease; 
            border: 2px solid transparent; 
        }
        
        .app-icon:hover .app-img { 
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.25); 
        }
        
        .app-name { 
            font-size: 0.85rem; 
            font-weight: 700; 
            word-break: break-word; 
            color: var(--text-color); 
            letter-spacing: 0.3px;
        }

        /* Floating Add Button */
        #add-btn { position: fixed; bottom: 35px; right: 35px; width: 65px; height: 65px; border-radius: 50%; background: var(--primary); color: white; font-size: 2.2rem; border: none; cursor: pointer; box-shadow: 0 8px 20px rgba(67, 97, 238, 0.4); display: flex; justify-content: center; align-items: center; z-index: 100; transition: all 0.3s ease; animation: float 3s ease-in-out infinite; }
        #add-btn:hover { background: #324fc2; transform: scale(1.1); animation: none; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Modals */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--panel-bg); padding: 25px; border-radius: 20px; width: 90%; max-width: 420px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: var(--shadow-md); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-actions { display: flex; justify-content: space-between; margin-top: 20px; gap: 12px; }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Notice Editor specific styles */
        .toolbar { display: flex; gap: 10px; margin-top: 15px; margin-bottom: 15px; }
        .toolbar button { flex: 1; padding: 10px; font-size: 0.9rem; background: #f8f9fa; border: 1px solid #dcdcdc; color: var(--text-color); border-radius: 8px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .toolbar button:hover { background: #e9ecef; border-color: #ced4da; }
        #notice-editor { min-height: 150px; background: #f8f9fc; padding: 15px; border-radius: 8px; outline: none; border: 1px solid #dcdcdc; max-height: 250px; overflow-y: auto; color: var(--text-color); transition: border 0.3s; font-size: 0.95rem; line-height: 1.5; }
        #notice-editor:focus { border-color: var(--primary); background: #ffffff; }
        #notice-editor img, #viewer-content img { max-width: 100%; border-radius: 8px; margin: 10px 0; display: block; box-shadow: var(--shadow-sm); }
        #notice-editor a, #viewer-content a { color: var(--primary); word-break: break-all; font-weight: 500; text-decoration: none; }
        #notice-editor a:hover, #viewer-content a:hover { text-decoration: underline; }
        #viewer-content { margin-bottom: 25px; font-size: 1.05rem; line-height: 1.6; color: #333; }

        /* Notice & Image Update styles */
        .notice-img-container { position: relative; display: block; margin: 10px 0; }
        .del-img-btn { position: absolute; top: 8px; right: 8px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-weight: bold; font-size: 16px; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .del-img-btn:hover { transform: scale(1.1); }
        #viewer-content .del-img-btn { display: none !important; }
        .modal-cross-btn { position: absolute; top: 15px; right: 15px; background: #f1f3f5; border-radius: 50%; width: 32px; height: 32px; border: none; color: #6c757d; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .modal-cross-btn:hover { background: #e9ecef; color: var(--danger); transform: rotate(90deg); }

        /* --- SLIDER CSS --- */
        #slider-container { width: 100%; aspect-ratio: 16/9; max-height: 250px; background: rgba(255,255,255,0.5); backdrop-filter: blur(5px); position: relative; overflow: hidden; display: none; box-shadow: inset 0 -4px 10px rgba(0,0,0,0.02); }
        #slider-track { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        #slider-track::-webkit-scrollbar { display: none; }
        .slide { flex: 0 0 100%; height: 100%; scroll-snap-align: center; position: relative; display: flex; align-items: center; justify-content: center; background: transparent; border-right: 1px solid rgba(0,0,0,0.05);}
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide-edit-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(3px); display: flex; flex-direction: column; gap: 12px; align-items: center; justify-content: center; z-index: 10; }
        .empty-slide-text { color: #adb5bd; font-size: 1.1rem; font-weight: 500; }

        /* =======================================
           NEW LOADING ANIMATION CSS 
        ======================================= */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(-45deg, #f4f7f6, #e0eafc, #cfdef3, #eef2f3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: 999999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .loader-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .t3-loader-svg {
            width: 130px;
            height: 130px;
            filter: drop-shadow(0 4px 10px rgba(67, 97, 238, 0.2));
            animation: float-svg 3s ease-in-out infinite;
        }

        @keyframes float-svg {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
            100% { transform: translateY(0px) scale(1); }
        }

        .svg-path-t, .svg-path-3 {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 150;
            stroke-dashoffset: 150;
            animation: draw-t3 2.5s ease-in-out infinite alternate;
        }

        .svg-path-t { stroke: var(--primary); }
        .svg-path-3 { stroke: var(--danger); animation-delay: 0.3s; }

        @keyframes draw-t3 {
            0% { stroke-dashoffset: 150; }
            100% { stroke-dashoffset: 0; }
        }

        .loader-bottom-logo {
            position: absolute;
            bottom: 40px;
            animation: popInLogo 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .loader-bottom-logo img {
            height: 100px;
            border-radius: 8px;
        }

        @keyframes popInLogo {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <svg class="t3-loader-svg" viewBox="0 0 100 100">
            <path class="svg-path-t" d="M 25 35 H 45 M 35 35 V 65"></path>
            <path class="svg-path-3" d="M 55 35 Q 75 35 65 50 Q 80 50 55 65"></path>
        </svg>

        <div class="loader-bottom-logo">
            <img src="https://i.ibb.co/zHTsdx0V/Dofoto-20260430-133314752.png" alt="ree">
        </div>
    </div>

    <script>
        // Start load logic directly independent of Firebase to ensure it smoothly disappears
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader-wrapper');
                loader.classList.add('loader-hidden');
            }, 2000); // 2 Seconds ka minimum loading time diya hai cool effect dikhne ke liye
        });
    </script>


    <div id="login-screen" class="hidden">
        <div id="login-box">
            <img src="https://placehold.co/200x60/4361ee/ffffff?text=YOUR+LOGO" alt="App Logo" style="height: 55px; margin-bottom: 10px; border-radius: 8px;">
            <p style="color: #6c757d; font-size: 0.95rem; margin-top: 5px;">Enter 8-digit password</p>
            
            <input type="password" id="login-pass" maxlength="8" placeholder="********">
            <button class="btn btn-primary" id="btn-login" style="width: 100%; margin-top: 10px; padding: 14px;">Open Panel</button>
        </div>
    </div>

    <div id="main-panel">
        <header>
            <div class="header-left">
                <button class="icon-btn hidden" id="btn-back" title="Back" style="font-size: 1.4rem;">⬅</button>
                <img src="https://placehold.co/100x30/4361ee/ffffff?text=LOGO" alt="App Logo" style="height: 32px; border-radius: 4px;">
            </div>
            <div class="header-right">
                <input type="text" id="search-bar" class="hidden" placeholder="Search apps...">
                <button class="icon-btn" id="btn-search" title="Search">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
                
                <button class="icon-btn hidden" id="btn-edit" title="Edit Mode" style="font-size: 1.4rem;">✏️</button>
                <button class="icon-btn hidden" id="btn-settings" title="Settings" style="font-size: 1.4rem;">⚙️</button>
            </div>
        </header>

        <div id="slider-container">
            <div id="slider-track"></div>
            <input type="file" id="slider-img-input" accept="image/*" class="hidden">
        </div>

        <div id="app-grid">
        </div>

        <button id="add-btn" class="hidden">+</button>
    </div>

    <div id="app-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-top: 0; color: var(--primary);">Add New Link</h3>
            <input type="hidden" id="app-id">
            <div style="background: #f8f9fc; padding: 10px; border-radius: 8px; border: 1px dashed #dcdcdc; margin: 10px 0; text-align: center;">
                <label for="app-photo" style="cursor: pointer; color: var(--primary); font-weight: 500; display: block; padding: 10px 0;">📸 Upload App Icon</label>
                <input type="file" id="app-photo" accept="image/*" style="display: none;">
                <img id="preview-img" style="width: 70px; height: 70px; border-radius: 15px; display: none; margin: 10px auto; box-shadow: var(--shadow-sm); object-fit: cover;">
            </div>
            <input type="text" id="app-name" placeholder="App Name (e.g., YouTube)">
            <input type="url" id="app-link" placeholder="Final Link (e.g., https://youtube.com)">
            <div class="modal-actions">
                <button class="btn btn-danger" id="btn-delete" class="hidden">Delete</button>
                <button class="btn" id="btn-cancel-app" style="background:#e9ecef; color: #495057;">Cancel</button>
                <button class="btn btn-primary" id="btn-save-app" style="flex: 1;">Next (Notice)</button>
            </div>
        </div>
    </div>

    <div id="notice-builder-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 500px;">
            <h3 style="margin-top: 0; color: var(--primary);">Create/Edit Notice</h3>
            <p style="font-size: 0.85rem; color: #6c757d; margin-top: -10px;">Type text, or insert images/links below.</p>
            
            <div class="toolbar">
                <button id="btn-notice-img">📷 Add Image</button>
                <button id="btn-notice-link">🔗 Add Link</button>
                <input type="file" id="notice-img-input" accept="image/*" class="hidden">
            </div>
            
            <div id="notice-editor" contenteditable="true" placeholder="Write notice here..."></div>
            
            <div class="modal-actions">
                <button class="btn" id="btn-cancel-notice" style="background:#e9ecef; color: #495057;">Back</button>
                <button class="btn btn-success" id="btn-save-final" style="flex: 1; margin-left: 10px;">Save & Publish</button>
            </div>
        </div>
    </div>

    <div id="notice-viewer-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 500px;">
            <button id="btn-close-viewer" class="modal-cross-btn" title="Close">&times;</button>
            <h3 id="viewer-title" style="text-align: center; margin-top: 0; padding-right: 25px; color: var(--primary);">Notice</h3>
            
            <div id="viewer-content"></div>
            
            <button id="viewer-link-btn" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 15px; margin-top: 15px; box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);">Open Final Link</button>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h3 style="margin-top: 0; color: var(--primary);">Change Password</h3>
            <input type="email" id="set-email" placeholder="Email Address">
            <input type="password" id="set-old-pass" placeholder="Old Password">
            <input type="password" id="set-new-pass" maxlength="8" placeholder="New 8-digit Password">
            <div class="modal-actions">
                <button class="btn" id="btn-cancel-settings" style="background:#e9ecef; color: #495057;">Cancel</button>
                <button class="btn btn-primary" id="btn-save-settings" style="flex: 1;">Update</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOdF10p3WVV5XDE8jnzttzw3VnZJU-bXU",
            authDomain: "game-b37ee.firebaseapp.com",
            databaseURL: "https://game-b37ee-default-rtdb.firebaseio.com",
            projectId: "game-b37ee",
            storageBucket: "game-b37ee.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentPassword = "12345678"; 
        let isEditMode = false;
        let base64Image = "";
        let tempAppData = {}; 

        const loginScreen = document.getElementById('login-screen');
        const mainPanel = document.getElementById('main-panel');
        const appGrid = document.getElementById('app-grid');
        
        const passRef = ref(db, 'admin/password');
        get(passRef).then((snapshot) => {
            if (snapshot.exists()) {
                currentPassword = snapshot.val();
            } else {
                set(passRef, "12345678"); 
            }
        });

        // Initialize apps load directly since login is bypassed visually
        loadApps();

        // 1. LOGIN LOGIC
        document.getElementById('btn-login').addEventListener('click', () => {
            const inputPass = document.getElementById('login-pass').value;
            if(inputPass === currentPassword && inputPass.length === 8) {
                loginScreen.classList.add('hidden');
                mainPanel.classList.remove('hidden');
                loadApps();
            } else {
                alert("Incorrect Password or not 8 digits!");
            }
        });

        // 2. BACK BUTTON
        document.getElementById('btn-back').addEventListener('click', () => {
            mainPanel.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            document.getElementById('login-pass').value = '';
        });

        // 3. EDIT MODE TOGGLE
        document.getElementById('btn-edit').addEventListener('click', (e) => {
            isEditMode = !isEditMode;
            e.target.classList.toggle('edit-active');
            if(isEditMode) {
                alert("Edit Mode ON: Click any icon to edit or delete it.");
            }
            loadSlider(); // Updates slider edit overlay state
        });

        // 4. LOAD APPS
        function loadApps() {
            const appsRef = ref(db, 'apps');
            onValue(appsRef, (snapshot) => {
                appGrid.innerHTML = ''; 
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    for (const id in data) {
                        createAppIcon(id, data[id]);
                    }
                }
                
                // Yahan ek chhoti si update ki hai taaki Firebase Realtime update hone par
                // search apply rahe aur screen reset na ho jaye.
                const currentSearchTerm = document.getElementById('search-bar').value;
                if(currentSearchTerm) {
                    applySearch(currentSearchTerm);
                }
            });
        }

        function createAppIcon(id, data) {
            const div = document.createElement('div');
            div.className = 'app-icon';
            div.innerHTML = `
                <img src="${data.photo}" class="app-img">
                <span class="app-name">${data.name}</span>
            `;
            div.addEventListener('click', () => {
                if (isEditMode) {
                    openEditModal(id, data);
                } else {
                    openNoticeViewer(data);
                }
            });
            appGrid.appendChild(div);
        }

        // 5. ADD / EDIT APP MODAL (Step 1)
        const appModal = document.getElementById('app-modal');
        const noticeBuilderModal = document.getElementById('notice-builder-modal');
        const noticeEditor = document.getElementById('notice-editor');
        
        document.getElementById('add-btn').addEventListener('click', () => {
            document.getElementById('modal-title').innerText = "Add New Link";
            document.getElementById('app-id').value = "";
            document.getElementById('app-name').value = "";
            document.getElementById('app-link').value = "";
            document.getElementById('app-photo').value = "";
            document.getElementById('preview-img').style.display = "none";
            document.getElementById('btn-delete').classList.add('hidden');
            base64Image = "";
            tempAppData = {};
            appModal.classList.remove('hidden');
        });

        function openEditModal(id, data) {
            document.getElementById('modal-title').innerText = "Edit Link";
            document.getElementById('app-id').value = id;
            document.getElementById('app-name').value = data.name;
            document.getElementById('app-link').value = data.link;
            document.getElementById('app-photo').value = "";
            
            const preview = document.getElementById('preview-img');
            preview.src = data.photo;
            preview.style.display = "block";
            base64Image = data.photo; 
            
            tempAppData = { notice: data.notice || "" };
            
            document.getElementById('btn-delete').classList.remove('hidden');
            appModal.classList.remove('hidden');
        }

        document.getElementById('btn-cancel-app').addEventListener('click', () => appModal.classList.add('hidden'));

        document.getElementById('app-photo').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    base64Image = event.target.result;
                    const preview = document.getElementById('preview-img');
                    preview.src = base64Image;
                    preview.style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('btn-save-app').addEventListener('click', () => {
            const id = document.getElementById('app-id').value;
            const name = document.getElementById('app-name').value;
            const link = document.getElementById('app-link').value;

            if (!name || !link || !base64Image) {
                alert("Please provide name, final link, and photo!");
                return;
            }

            tempAppData.id = id;
            tempAppData.name = name;
            tempAppData.link = link;
            tempAppData.photo = base64Image;

            appModal.classList.add('hidden');
            
            noticeEditor.innerHTML = tempAppData.notice || "";
            noticeBuilderModal.classList.remove('hidden');
        });

        document.getElementById('btn-delete').addEventListener('click', () => {
            const id = document.getElementById('app-id').value;
            if (confirm("Are you sure you want to delete this icon?")) {
                remove(ref(db, 'apps/' + id));
                appModal.classList.add('hidden');
            }
        });


        // 6. NOTICE BUILDER MODAL LOGIC (Step 2)
        function insertAtCursor(html) {
            noticeEditor.focus();
            if(!document.execCommand('insertHTML', false, html)) {
                noticeEditor.innerHTML += html; 
            }
        }

        document.getElementById('btn-cancel-notice').addEventListener('click', () => {
            noticeBuilderModal.classList.add('hidden');
            appModal.classList.remove('hidden'); 
        });

        document.getElementById('btn-notice-img').addEventListener('click', () => {
            document.getElementById('notice-img-input').click();
        });

        document.getElementById('notice-img-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const b64 = event.target.result;
                    insertAtCursor(`<div class="notice-img-container" contenteditable="false"><img src="${b64}" alt="Notice Image"><button class="del-img-btn" onclick="this.parentElement.remove()">&times;</button></div>`);
                };
                reader.readAsDataURL(file);
            }
            e.target.value = ""; 
        });

        document.getElementById('btn-notice-link').addEventListener('click', () => {
            const url = prompt("Enter the URL to insert in notice:");
            if (url) {
                insertAtCursor(`<a href="${url}" target="_blank">${url}</a>`);
            }
        });

        document.getElementById('btn-save-final').addEventListener('click', () => {
            tempAppData.notice = noticeEditor.innerHTML;

            const finalData = {
                name: tempAppData.name,
                link: tempAppData.link,
                photo: tempAppData.photo,
                notice: tempAppData.notice
            };

            if (tempAppData.id) {
                update(ref(db, 'apps/' + tempAppData.id), finalData);
            } else {
                push(ref(db, 'apps'), finalData);
            }
            
            noticeBuilderModal.classList.add('hidden');
            tempAppData = {}; 
        });


        // 7. NOTICE VIEWER (Display to User)
        const noticeViewerModal = document.getElementById('notice-viewer-modal');
        const viewerContent = document.getElementById('viewer-content');
        const viewerLinkBtn = document.getElementById('viewer-link-btn');

        function openNoticeViewer(data) {
            viewerContent.innerHTML = data.notice || "<p>No notice provided.</p>";
            viewerLinkBtn.onclick = () => {
                window.open(data.link, '_blank');
            };
            noticeViewerModal.classList.remove('hidden');
        }

        document.getElementById('btn-close-viewer').addEventListener('click', () => {
            noticeViewerModal.classList.add('hidden');
            viewerContent.innerHTML = "";
        });


        // 8. SETTINGS MODAL
        const settingsModal = document.getElementById('settings-modal');
        
        document.getElementById('btn-settings').addEventListener('click', () => {
            settingsModal.classList.remove('hidden');
            document.getElementById('set-email').value = "";
            document.getElementById('set-old-pass').value = "";
            document.getElementById('set-new-pass').value = "";
        });

        document.getElementById('btn-cancel-settings').addEventListener('click', () => settingsModal.classList.add('hidden'));

        document.getElementById('btn-save-settings').addEventListener('click', () => {
            const email = document.getElementById('set-email').value;
            const oldPass = document.getElementById('set-old-pass').value;
            const newPass = document.getElementById('set-new-pass').value;

            if (email !== "ambujewns404@gmail.com") {
                alert("Unauthorized Email!");
                return;
            }
            if (oldPass !== currentPassword) {
                alert("Old password incorrect!");
                return;
            }
            if (newPass.length !== 8) {
                alert("New password must be exactly 8 digits!");
                return;
            }

            set(ref(db, 'admin/password'), newPass).then(() => {
                currentPassword = newPass;
                alert("Password changed successfully!");
                settingsModal.classList.add('hidden');
            }).catch((err) => {
                alert("Error changing password: " + err.message);
            });
        });

        // ==========================================
        // 9. NAYA SLIDER FEATURE LOGIC
        // ==========================================
        let sliderDataCache = {};
        let slideInterval;
        let slideDirection = 1;
        let currentSlideSlot = -1;

        function loadSlider() {
            const track = document.getElementById('slider-track');
            if (!track) return;
            track.innerHTML = '';
            
            // Check agar ek bhi image hai normal mode ke liye
            let hasImages = false;
            for (let i = 1; i <= 5; i++) {
                if (sliderDataCache['slide' + i]) hasImages = true;
            }

            // Agar normal mode me hai aur koi image nahi hai, toh chhupa do
            if (!isEditMode && !hasImages) {
                document.getElementById('slider-container').style.display = 'none';
                return;
            } else {
                document.getElementById('slider-container').style.display = 'block';
            }

            // 5 slots banayenge
            for(let i = 1; i <= 5; i++) {
                const b64 = sliderDataCache['slide'+i];
                if (!b64 && !isEditMode) continue; // Normal view me khali slot skip karo

                const slide = document.createElement('div');
                slide.className = 'slide';
                
                if (b64) {
                    slide.innerHTML = `<img src="${b64}">`;
                } else {
                    slide.innerHTML = `<div class="empty-slide-text">Slot ${i} Khali Hai</div>`;
                }

                // Edit Mode me buttons add karna
                if (isEditMode) {
                    const overlay = document.createElement('div');
                    overlay.className = 'slide-edit-overlay';
                    
                    const upBtn = document.createElement('button');
                    upBtn.className = 'btn btn-primary';
                    upBtn.innerText = b64 ? 'Change Image' : 'Upload Image';
                    upBtn.onclick = (e) => { 
                        e.stopPropagation(); 
                        currentSlideSlot = i; 
                        document.getElementById('slider-img-input').click(); 
                    };
                    overlay.appendChild(upBtn);

                    if (b64) {
                        const delBtn = document.createElement('button');
                        delBtn.className = 'btn btn-danger';
                        delBtn.innerText = 'Delete';
                        delBtn.onclick = (e) => {
                            e.stopPropagation();
                            if(confirm('Yeh image delete karni hai?')) {
                                remove(ref(db, 'slider/slide' + i));
                            }
                        };
                        overlay.appendChild(delBtn);
                    }
                    slide.appendChild(overlay);
                }
                track.appendChild(slide);
            }
            startAutoScroll();
        }

        // Firebase Realtime Database se Slider ka data fetch karna
        const sliderRef = ref(db, 'slider');
        onValue(sliderRef, (snapshot) => {
            sliderDataCache = snapshot.exists() ? snapshot.val() : {};
            loadSlider();
        });

        // Image Gallery se Upload Logic
        document.getElementById('slider-img-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && currentSlideSlot !== -1) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const b64 = event.target.result;
                    set(ref(db, 'slider/slide' + currentSlideSlot), b64).then(() => {
                        // Upload successful
                    });
                };
                reader.readAsDataURL(file);
            }
            e.target.value = ""; // Input reset karo
        });

        // Auto Scroll aur Reverse (Ping-Pong) Logic
        function startAutoScroll() {
            clearInterval(slideInterval);
            if (isEditMode) return; // Edit mode me auto-scroll band rahega
            
            slideInterval = setInterval(() => {
                const track = document.getElementById('slider-track');
                if (!track) return;
                
                const maxScroll = track.scrollWidth - track.clientWidth;
                if (maxScroll <= 0) return; // Agar 1 hi image hai toh mat scroll karo
                
                // End par pohanchne ke baad reverse direction set karo
                if (track.scrollLeft >= maxScroll - 10) {
                    slideDirection = -1; // Reverse
                } else if (track.scrollLeft <= 10) {
                    slideDirection = 1;  // Forward
                }
                
                track.scrollBy({ left: track.clientWidth * slideDirection, behavior: 'smooth' });
            }, 3000); // Har 3 second baad scroll
        }

        // User touch karega toh automatic scrolling ruk jayegi
        const trackEl = document.getElementById('slider-track');
        trackEl.addEventListener('touchstart', () => clearInterval(slideInterval), {passive: true});
        trackEl.addEventListener('touchend', () => setTimeout(startAutoScroll, 4000), {passive: true});
        trackEl.addEventListener('mouseenter', () => clearInterval(slideInterval));
        trackEl.addEventListener('mouseleave', startAutoScroll);

        // ==========================================
        // 10. SEARCH FEATURE LOGIC (Naya Update)
        // ==========================================
        const btnSearch = document.getElementById('btn-search');
        const searchBar = document.getElementById('search-bar');

        // Search icon par click hone par bar open/close karna
        btnSearch.addEventListener('click', () => {
            searchBar.classList.toggle('hidden');
            if (!searchBar.classList.contains('hidden')) {
                searchBar.focus(); // Khulte hi type karne ke liye ready
            } else {
                searchBar.value = ''; // Close karne par reset
                applySearch(''); // Sab wapas show karne ke liye
            }
        });

        // Jab user search bar me type karega
        searchBar.addEventListener('input', (e) => {
            applySearch(e.target.value);
        });

        // Main filter function
        function applySearch(query) {
            query = query.toLowerCase(); // Case-insensitive banane ke liye
            const allIcons = document.querySelectorAll('.app-icon');
            
            allIcons.forEach(icon => {
                const appName = icon.querySelector('.app-name').innerText.toLowerCase();
                
                // Agar search word naam ke andar hai (starting me ya beech me kahin bhi)
                if (appName.includes(query)) {
                    icon.style.display = 'flex'; // Dikhao
                } else {
                    icon.style.display = 'none'; // Chhupao
                }
            });
        }

    </script>
</body>
</html>
