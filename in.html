<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="logo.jpg?v=1.1">
    <link rel="apple-touch-icon" sizes="192x192" href="logo.jpg?v=1.1">
    <link rel="manifest" href="manifest.json">
    <title>T3 | Dashboard Panel</title>
    <style>
        :root {
            /* Light Theme Colors from index 7 */
            --bg-color: #f4f7f6;
            --panel-bg: #ffffff;
            --text-color: #2b2d42;
            --primary: #4361ee;
            --danger: #ef233c;
            --success: #06d6a0;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.12);
        }
        
        /* Animated Background from index 7 */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: var(--text-color); 
            transition: all 0.3s ease;
            background: linear-gradient(-45deg, #f4f7f6, #e0eafc, #cfdef3, #eef2f3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Utility */
        .hidden { display: none !important; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; border-radius: 5px; border: none; background: #f8f9fc; color: var(--text-color); }
        
        /* Main Panel */
        #main-panel { display: flex; flex-direction: column; height: 100vh; position: relative; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow: var(--shadow-sm); border-bottom: 1px solid rgba(255,255,255,0.5); }
        .header-left, .header-right { display: flex; gap: 15px; align-items: center; }
        .icon-btn { background: none; border: none; color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .edit-active { color: #f5b700 !important; }

        /* Grid */
        #app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 20px; padding: 20px; }
        .app-icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-align: center; }
        .app-img { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; background: #fff; margin-bottom: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .app-name { font-size: 0.8rem; word-break: break-word; font-weight: bold; }

        /* Floating Add Button - CENTERED & UNIQUE SHAPE */
        #add-btn { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 140px; 
            height: 60px; 
            border-radius: 18px; 
            background: linear-gradient(135deg, var(--primary), #00d2ff); 
            color: white; 
            font-size: 1.4rem; 
            font-weight: bold;
            border: none; 
            cursor: pointer; 
            box-shadow: 0 6px 15px rgba(67, 97, 238, 0.4); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 8px;
            z-index: 100; 
            transition: all 0.3s ease;
        }
        #add-btn:hover {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.6);
        }

        /* Modals */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--panel-bg); padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: var(--shadow-md); }
        .modal-actions { display: flex; justify-content: space-between; margin-top: 15px; gap: 10px; }
        
        /* Notice Editor specific styles */
        .toolbar { display: flex; gap: 10px; margin-top: 10px; margin-bottom: 10px; }
        .toolbar button { flex: 1; padding: 8px; font-size: 0.9rem; background: #f8f9fa; border: 1px solid #dcdcdc; color: var(--text-color); border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;}
        #notice-editor { min-height: 150px; background: #f8f9fc; padding: 10px; border-radius: 5px; outline: none; border: 1px solid #dcdcdc; max-height: 250px; overflow-y: auto; color: var(--text-color); }
        #notice-editor img, #viewer-content img { max-width: 100%; border-radius: 5px; margin: 10px 0; display: block; }
        #notice-editor a, #viewer-content a { color: var(--primary); word-break: break-all; }
        #viewer-content { margin-bottom: 20px; font-size: 1rem; line-height: 1.5; }
        
        /* Added limits styling */
        .limit-counter { font-size: 0.8rem; color: #6c757d; text-align: right; margin-top: -5px; margin-bottom: 10px; font-weight: bold; }
        .notice-counter { margin-top: 5px; margin-bottom: 0px; }

        /* New styles for updates */
        .notice-img-container { position: relative; display: block; margin: 10px 0; }
        .del-img-btn { position: absolute; top: 8px; right: 8px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; font-weight: bold; font-size: 16px; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        #viewer-content .del-img-btn { display: none !important; }
        .modal-cross-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #6c757d; cursor: pointer; line-height: 1; padding: 0; transition: color 0.2s; display: flex; align-items: center;}
        .modal-cross-btn:hover { color: var(--danger); }

        /* LOADING ANIMATION CSS (From Index 7) */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(-45deg, #f4f7f6, #e0eafc, #cfdef3, #eef2f3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: 999999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .loader-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .t3-loader-svg {
            width: 130px;
            height: 130px;
            filter: drop-shadow(0 4px 10px rgba(67, 97, 238, 0.2));
            animation: float-svg 3s ease-in-out infinite;
        }

        @keyframes float-svg {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
            100% { transform: translateY(0px) scale(1); }
        }

        .svg-path-t, .svg-path-3 {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 150;
            stroke-dashoffset: 150;
            animation: draw-t3 2.5s ease-in-out infinite alternate;
        }

        .svg-path-t { stroke: var(--primary); }
        .svg-path-3 { stroke: var(--danger); animation-delay: 0.3s; }

        @keyframes draw-t3 {
            0% { stroke-dashoffset: 150; }
            100% { stroke-dashoffset: 0; }
        }

        .loader-bottom-logo {
            position: absolute;
            bottom: 40px;
            animation: popInLogo 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .loader-bottom-logo img {
            height: 100px;
            border-radius: 8px;
        }

        @keyframes popInLogo {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <svg class="t3-loader-svg" viewBox="0 0 100 100">
            <path class="svg-path-t" d="M 25 35 H 45 M 35 35 V 65"></path>
            <path class="svg-path-3" d="M 55 35 Q 75 35 65 50 Q 80 50 55 65"></path>
        </svg>

        <div class="loader-bottom-logo">
            <img src="https://i.ibb.co/Xf6rYcCC/Dofoto-20260703-071203550.png" alt="ree">
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader-wrapper');
                loader.classList.add('loader-hidden');
            }, 5000); 
        });
    </script>

    <div id="main-panel">
        <header>
            <div class="header-left">
                <button class="icon-btn" id="btn-back" title="Back" style="margin-right: 10px;" onclick="window.location.href='index.html'">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </button>
                <img src="https://t3reeworld.vercel.app/logo.jpg" alt="App Logo" style="height: 35px; border-radius: 8px;">
            </div>
            <div class="header-right">
                <button class="icon-btn" id="btn-edit" title="Edit Mode">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    <span id="edit-status" style="display: none; font-size: 1rem; font-weight: bold; margin-left: 5px;">ON</span>
                </button>
            </div>
        </header>

        <div id="app-grid">
        </div>

        <div id="wellbeing-tool" class="hidden" style="text-align: center; padding: 25px; background: var(--panel-bg); margin: 30px auto; max-width: 90%; width: 300px; border-radius: 18px; box-shadow: var(--shadow-md); border: 1px solid #dcdcdc;">
            <h3 style="margin-top: 0; color: var(--text-color); font-size: 1.1rem; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <svg width="24" height="24" fill="var(--primary)" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg> 
                Wellbeing Analytics
            </h3>
            <div style="display: flex; justify-content: space-around;">
                <div>
                    <div style="font-size: 2.5rem; font-weight: bold; color: var(--primary);" id="stat-views">0</div>
                    <div style="font-size: 0.9rem; color: #6c757d; margin-top: 5px;">App/Icon Visits</div>
                </div>
                <div>
                    <div style="font-size: 2.5rem; font-weight: bold; color: var(--success);" id="stat-clicks">0</div>
                    <div style="font-size: 0.9rem; color: #6c757d; margin-top: 5px;">Website Clicks</div>
                </div>
            </div>
        </div>

        <button id="add-btn">
            <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> ADD
        </button>
    </div>

    <div id="app-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title" style="color: var(--primary); margin-top: 0;">Add New Link</h3>
            <input type="hidden" id="app-id">
            <input type="file" id="app-photo" accept="image/*">
            <img id="preview-img" style="width: 60px; height: 60px; border-radius: 10px; display: none; margin: 10px 0;">
            
            <input type="text" id="app-name" placeholder="App Name (e.g., Google)" maxlength="10">
            <div id="app-name-counter" class="limit-counter">0/10</div>

            <input type="url" id="app-link" placeholder="Final Link (e.g., https://google.com)">
            <div class="modal-actions">
                <button class="btn btn-danger" id="btn-delete" class="hidden">Delete</button>
                <button class="btn" id="btn-cancel-app" style="background:#e9ecef; color: var(--text-color);">Cancel</button>
                <button class="btn btn-primary" id="btn-save-app">Next</button>
            </div>
        </div>
    </div>

    <div id="notice-builder-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 500px;">
            <h3 style="color: var(--primary); margin-top: 0;">Create/Edit Notice</h3>
            <p style="font-size: 0.8rem; color: #6c757d; margin-top: 0;">Type text, or insert images/links below.</p>
            
            <div class="toolbar">
                <button id="btn-notice-img">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg> Add Image
                </button>
                <button id="btn-notice-link">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V19h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg> Add Link
                </button>
                <input type="file" id="notice-img-input" accept="image/*" class="hidden">
            </div>
            
            <div id="notice-editor" contenteditable="true" placeholder="Write notice here..."></div>
            
            <div id="notice-text-counter" class="limit-counter notice-counter">0/100</div>
            
            <div class="modal-actions">
                <button class="btn" id="btn-cancel-notice" style="background:#e9ecef; color: var(--text-color); display: flex; align-items: center; justify-content: center; gap: 5px;">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg> Back
                </button>
                <button class="btn btn-success" id="btn-save-final" style="flex: 1; margin-left: 10px;">Save & Publish</button>
            </div>
        </div>
    </div>

    <div id="notice-viewer-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 500px;">
            <button id="btn-close-viewer" class="modal-cross-btn" title="Close">
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
            <h3 id="viewer-title" style="text-align: center; margin-top: 0; padding-right: 25px; color: var(--primary);">Notice</h3>
            
            <div id="viewer-content"></div>
            
            <button id="viewer-link-btn" class="btn btn-primary" style="width: 100%; font-size: 1.2rem; padding: 15px; margin-top: 15px; box-shadow: var(--shadow-sm);">Open Final Link</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOdF10p3WVV5XDE8jnzttzw3VnZJU-bXU",
            authDomain: "game-b37ee.firebaseapp.com",
            databaseURL: "https://game-b37ee-default-rtdb.firebaseio.com",
            projectId: "game-b37ee",
            storageBucket: "game-b37ee.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isEditMode = false;
        let base64Image = "";
        let tempAppData = {}; 

        const mainPanel = document.getElementById('main-panel');
        const appGrid = document.getElementById('app-grid');

        // Text tracking elements
        const appNameInput = document.getElementById('app-name');
        const appNameCounter = document.getElementById('app-name-counter');
        const noticeEditor = document.getElementById('notice-editor');
        const noticeTextCounter = document.getElementById('notice-text-counter');

        function incrementStat(appId, key) {
            const statRef = ref(db, 'apps/' + appId + '/' + key);
            get(statRef).then((snapshot) => {
                const currentVal = snapshot.val() || 0;
                update(ref(db, 'apps/' + appId), { [key]: currentVal + 1 });
            });
        }

        function checkUserAppLimit() {
            if (localStorage.getItem('hasAddedApp') === 'true') {
                document.getElementById('add-btn').style.display = 'none';
            } else {
                document.getElementById('add-btn').style.display = 'flex';
            }
        }

        checkUserAppLimit();
        loadApps();

        const btnEdit = document.getElementById('btn-edit');
        const editStatus = document.getElementById('edit-status');
        
        btnEdit.addEventListener('click', () => {
            isEditMode = !isEditMode;
            btnEdit.classList.toggle('edit-active');
            if(isEditMode) {
                editStatus.style.display = 'inline';
                alert("Edit Mode ON: Click any icon to edit or delete it.");
            } else {
                editStatus.style.display = 'none';
            }
        });

        function loadApps() {
            const appsRef = ref(db, 'apps');
            onValue(appsRef, (snapshot) => {
                appGrid.innerHTML = ''; 
                const myAppId = localStorage.getItem('myAppId'); 
                
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    for (const id in data) {
                        if (id === myAppId) {
                            createAppIcon(id, data[id]);
                            
                            const wellbeingTool = document.getElementById('wellbeing-tool');
                            if(wellbeingTool) {
                                wellbeingTool.classList.remove('hidden');
                                document.getElementById('stat-views').innerText = data[id].views || 0;
                                document.getElementById('stat-clicks').innerText = data[id].clicks || 0;
                            }
                        }
                    }
                }
            });
        }

        function createAppIcon(id, data) {
            const div = document.createElement('div');
            div.className = 'app-icon';
            div.innerHTML = `
                <img src="${data.photo}" class="app-img">
                <span class="app-name">${data.name}</span>
            `;
            div.addEventListener('click', () => {
                if (isEditMode) {
                    openEditModal(id, data);
                } else {
                    incrementStat(id, 'views'); 
                    openNoticeViewer(data, id); 
                }
            });
            appGrid.appendChild(div);
        }

        // UPDATE: App Name Logic & Alerts
        function updateAppNameCounter() {
            appNameCounter.innerText = `${appNameInput.value.length}/10`;
        }

        appNameInput.addEventListener('input', updateAppNameCounter);
        appNameInput.addEventListener('keydown', (e) => {
            const allowedKeys = ['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'Tab'];
            if (appNameInput.value.length >= 10 && !allowedKeys.includes(e.key) && !e.ctrlKey && !e.metaKey) {
                alert("Maximum limit of 10 characters reached for App Name!");
                e.preventDefault();
            }
        });

        const appModal = document.getElementById('app-modal');
        const noticeBuilderModal = document.getElementById('notice-builder-modal');
        
        document.getElementById('add-btn').addEventListener('click', () => {
            document.getElementById('modal-title').innerText = "Add New Link";
            document.getElementById('app-id').value = "";
            document.getElementById('app-name').value = "";
            updateAppNameCounter(); // Reset App Name Counter
            document.getElementById('app-link').value = "";
            document.getElementById('app-photo').value = "";
            document.getElementById('preview-img').style.display = "none";
            document.getElementById('btn-delete').classList.add('hidden');
            base64Image = "";
            tempAppData = {};
            appModal.classList.remove('hidden');
        });

        function openEditModal(id, data) {
            document.getElementById('modal-title').innerText = "Edit Link";
            document.getElementById('app-id').value = id;
            document.getElementById('app-name').value = data.name;
            updateAppNameCounter(); // Update App Name Counter for edit
            document.getElementById('app-link').value = data.link;
            document.getElementById('app-photo').value = "";
            
            const preview = document.getElementById('preview-img');
            preview.src = data.photo;
            preview.style.display = "block";
            base64Image = data.photo; 
            
            tempAppData = { notice: data.notice || "" };
            
            document.getElementById('btn-delete').classList.remove('hidden');
            appModal.classList.remove('hidden');
        }

        document.getElementById('btn-cancel-app').addEventListener('click', () => appModal.classList.add('hidden'));

        document.getElementById('app-photo').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    base64Image = event.target.result;
                    const preview = document.getElementById('preview-img');
                    preview.src = base64Image;
                    preview.style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('btn-save-app').addEventListener('click', () => {
            const id = document.getElementById('app-id').value;
            const name = document.getElementById('app-name').value;
            const link = document.getElementById('app-link').value;

            if (!name || !link || !base64Image) {
                alert("Please provide name, final link, and photo!");
                return;
            }

            tempAppData.id = id;
            tempAppData.name = name;
            tempAppData.link = link;
            tempAppData.photo = base64Image;

            appModal.classList.add('hidden');
            
            noticeEditor.innerHTML = tempAppData.notice || "";
            updateNoticeCounter(); // Refresh counter on opening Notice Builder
            noticeBuilderModal.classList.remove('hidden');
        });

        document.getElementById('btn-delete').addEventListener('click', () => {
            const id = document.getElementById('app-id').value;
            if (confirm("Are you sure you want to delete this icon?")) {
                remove(ref(db, 'apps/' + id));
                localStorage.removeItem('hasAddedApp'); 
                localStorage.removeItem('myAppId'); 
                checkUserAppLimit(); 
                document.getElementById('wellbeing-tool').classList.add('hidden'); 
                appModal.classList.add('hidden');
            }
        });

        // UPDATE: Notice Builder Text Restrictions and Counter
        function getNoticeTextLength() {
            return noticeEditor.innerText.replace(/\n/g, "").length;
        }

        function updateNoticeCounter() {
            noticeTextCounter.innerText = `${getNoticeTextLength()}/100`;
        }

        noticeEditor.addEventListener('input', updateNoticeCounter);
        
        noticeEditor.addEventListener('keydown', (e) => {
            const allowedKeys = ['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Tab'];
            if (getNoticeTextLength() >= 100 && !allowedKeys.includes(e.key) && !e.ctrlKey && !e.metaKey) {
                alert("Maximum limit of 100 characters reached for Notice!");
                e.preventDefault();
            }
        });

        noticeEditor.addEventListener('paste', (e) => {
            e.preventDefault();
            let paste = (e.clipboardData || window.clipboardData).getData('text');
            let currentLen = getNoticeTextLength();
            let remaining = 100 - currentLen;
            
            if (remaining > 0) {
                let textToInsert = paste.substring(0, remaining);
                document.execCommand('insertText', false, textToInsert);
                if (paste.length > remaining) {
                    alert("Maximum limit of 100 characters reached! Extra text was removed.");
                }
            } else {
                alert("Maximum limit of 100 characters reached for Notice!");
            }
            updateNoticeCounter();
        });

        function insertAtCursor(html) {
            noticeEditor.focus();
            if(!document.execCommand('insertHTML', false, html)) {
                noticeEditor.innerHTML += html; 
            }
            updateNoticeCounter(); // Refresh after inserting link/img
        }

        document.getElementById('btn-cancel-notice').addEventListener('click', () => {
            noticeBuilderModal.classList.add('hidden');
            appModal.classList.remove('hidden'); 
        });

        // UPDATE: Check Notice Image Limits
        document.getElementById('btn-notice-img').addEventListener('click', () => {
            if (noticeEditor.querySelectorAll('img').length >= 1) {
                alert("You can only add a maximum of 1 image in the notice!");
                return;
            }
            document.getElementById('notice-img-input').click();
        });

        document.getElementById('notice-img-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const b64 = event.target.result;
                    insertAtCursor(`<div class="notice-img-container" contenteditable="false"><img src="${b64}" alt="Notice Image"><button class="del-img-btn" onclick="this.parentElement.remove(); document.getElementById('notice-text-counter').innerText = document.getElementById('notice-editor').innerText.replace(/\\n/g, '').length + '/100';">&times;</button></div>`);
                };
                reader.readAsDataURL(file);
            }
            e.target.value = ""; 
        });

        // UPDATE: Check Notice Link Limits
        document.getElementById('btn-notice-link').addEventListener('click', () => {
            if (noticeEditor.querySelectorAll('a').length >= 3) {
                alert("You can only add a maximum of 3 links in the notice!");
                return;
            }
            const url = prompt("Enter the URL to insert in notice:");
            if (url) {
                insertAtCursor(`<a href="${url}" target="_blank">${url}</a>`);
            }
        });

        document.getElementById('btn-save-final').addEventListener('click', () => {
            tempAppData.notice = noticeEditor.innerHTML;

            const finalData = {
                name: tempAppData.name,
                link: tempAppData.link,
                photo: tempAppData.photo,
                notice: tempAppData.notice,
                views: tempAppData.id ? undefined : 0, 
                clicks: tempAppData.id ? undefined : 0
            };

            if (tempAppData.id) {
                delete finalData.views;
                delete finalData.clicks;
                update(ref(db, 'apps/' + tempAppData.id), finalData);
            } else {
                const newAppRef = push(ref(db, 'apps')); 
                set(newAppRef, finalData); 
                
                localStorage.setItem('hasAddedApp', 'true'); 
                localStorage.setItem('myAppId', newAppRef.key); 
                checkUserAppLimit(); 
            }
            
            noticeBuilderModal.classList.add('hidden');
            tempAppData = {}; 
            
            // UPDATE: 3 Second Redirect back to main page (index.html)
            alert("App Published Successfully! Redirecting in 3 seconds...");
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 3000);
        });

        const noticeViewerModal = document.getElementById('notice-viewer-modal');
        const viewerContent = document.getElementById('viewer-content');
        const viewerLinkBtn = document.getElementById('viewer-link-btn');

        function openNoticeViewer(data, id) {
            viewerContent.innerHTML = data.notice || "<p>No notice provided.</p>";
            viewerLinkBtn.onclick = () => {
                if(id) incrementStat(id, 'clicks'); 
                window.open(data.link, '_blank');
            };
            noticeViewerModal.classList.remove('hidden');
        }

        document.getElementById('btn-close-viewer').addEventListener('click', () => {
            noticeViewerModal.classList.add('hidden');
            viewerContent.innerHTML = "";
        });

    </script>
</body>
</html>
